  <!-- Update brand count when index loads -->
  <script>
    (function () {
      var observer = new MutationObserver(function () {
        var groups = document.querySelectorAll('.dapp-group-count');
        if (!groups.length) return;
        var total = 0;
        groups.forEach(function (g) { total += parseInt(g.textContent, 10) || 0; });
        var brandCount = document.getElementById('dapp-brand-count');
        if (brandCount && total > 0) brandCount.textContent = total + ' snippets';
      });
      observer.observe(document.getElementById('dapp-nav'), { childList: true, subtree: true });
    })();
  </script>
